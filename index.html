<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SD건담외전 카드다스 아카이브</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "Malgun Gothic", "맑은 고딕", "Meiryo", sans-serif; background: #1a1d24; color: #e8e8ec; display: flex; height: 100vh; height: 100dvh; overflow: hidden; }
  #left { width: 56%; display: flex; flex-direction: column; border-right: 2px solid #333842; min-width: 0; background: #1a1d24; }
  header { padding: 10px 18px; background: #232732; border-bottom: 1px solid #333842; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 700; color: #ffd86b; }
  header .sub { font-size: 11px; color: #8b94a3; }
  .toggle { margin-left: auto; display: flex; gap: 6px; }
  .toggle button { border: 1px solid #4a5161; background: #2c313d; color: #cfd5e0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .toggle button.active { background: #ffd86b; color: #1a1d24; border-color: #ffd86b; font-weight: 700; }

  .prodtabs { display: flex; gap: 6px; padding: 9px 18px 0; background: #232732; flex-wrap: wrap; }
  .prodtabs button { border: 1px solid #6a5acd; background: #2b2640; color: #cfc6f0; padding: 7px 16px; border-radius: 9px; cursor: pointer; font-size: 13.5px; font-weight: 700; }
  .prodtabs button.active { background: #7b5cff; color: #fff; border-color: #9a82ff; }
  .tabsdim { opacity: .45; }

  .pentabs { display: flex; gap: 5px; padding: 8px 18px 0; background: #232732; flex-wrap: wrap; }
  .pentabs button { border: 1px solid #44506a; background: #262c3a; color: #c3ccdb; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12.5px; font-weight: 600; }
  .pentabs button.active { background: #2f6db0; color: #fff; border-color: #4f8fd0; }

  .seriestabs { display: flex; gap: 4px; padding: 8px 18px 0; background: #232732; flex-wrap: wrap; }
  .seriestabs button { border: 1px solid #3c4150; border-bottom: none; background: #21252e; color: #aab2c0; padding: 6px 12px; border-radius: 7px 7px 0 0; cursor: pointer; font-size: 12px; }
  .seriestabs button.active { background: #141720; color: #7fd1ff; font-weight: 700; border-color: #4a5161; }
  .seriestabs .cnt { color: #5c6573; font-size: 10px; margin-left: 4px; }

  #search { padding: 8px 18px; background: #20242e; border-bottom: 1px solid #333842; display: flex; align-items: center; gap: 10px; }
  #search input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #3c4150; background: #161922; color: #e8e8ec; font-size: 13px; }
  #search label.ext { font-size: 12px; color: #aab2c0; white-space: nowrap; display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  #search label.ext input { cursor: pointer; }
  #scount { font-size: 11px; color: #8b94a3; white-space: nowrap; }
  #scount b { color: #ffd86b; }

  .tablewrap { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { position: sticky; top: 0; background: #2a2f3a; color: #b9c0cc; font-size: 12px; font-weight: 600; text-align: left; padding: 8px 10px; border-bottom: 2px solid #3c4150; z-index: 2; }
  tbody tr { cursor: pointer; border-bottom: 1px solid #2a2e38; }
  tbody tr:hover { background: #272c37; }
  tbody tr.selected { background: #3a3320; box-shadow: inset 3px 0 0 #ffd86b; }
  td { padding: 7px 10px; font-size: 13px; vertical-align: middle; }
  td.no { white-space: nowrap; font-weight: 700; color: #ffd86b; }
  .nocell { display: flex; align-items: center; gap: 9px; }
  .thumb { width: 52px; height: 36px; object-fit: cover; border-radius: 4px; border: 1px solid #444b5a; background: #000; flex-shrink: 0; }
  .loc { display: block; color: #6f7a8a; font-size: 10px; font-weight: 600; margin-top: 2px; }
  td.name { font-weight: 600; color: #fff; min-width: 100px; }
  td.desc2 { color: #9aa6b6; font-size: 12px; line-height: 1.35; min-width: 120px; }
  td.loc2 { color: #9fb0c4; font-size: 12px; line-height: 1.35; min-width: 130px; font-weight: 600; }
  td.val { white-space: nowrap; color: #7fd1a0; font-weight: 700; font-family: Consolas, monospace; }
  td.dlg { color: #cfd5e0; line-height: 1.4; }

  #right { flex: 1; display: flex; flex-direction: column; background: #141720; min-width: 0; }
  #stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: safe center; padding: 20px; min-width: 0; min-height: 0; position: relative; overflow-y: auto; }
  .imgwrap { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; height: 60vh; flex-shrink: 0; }
  #stage.portrait .imgwrap { height: 80vh; }
  .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 46px; height: 66px; border: none; border-radius: 9px; background: rgba(255,255,255,.06); color: #cfd5e0; font-size: 30px; line-height: 1; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
  .nav-btn:disabled { opacity: .2; cursor: default; }
  .nav-btn:disabled:hover { background: rgba(255,255,255,.06); color: #cfd5e0; }
  .nav-prev { left: 12px; } .nav-next { right: 12px; }
  #cap-dlg { max-width: 94%; height: 28px; line-height: 28px; margin-bottom: 14px; color: #eef1f6; font-size: 15px; text-align: center; font-weight: 600; white-space: nowrap; overflow: hidden; flex-shrink: 0; }
  #cap-dlg:not(:empty)::before { content: "“"; color: #ffd86b; margin-right: 2px; }
  #cap-dlg:not(:empty)::after { content: "”"; color: #ffd86b; margin-left: 2px; }
  #right img { max-width: 100%; max-height: 100%; border-radius: 4% / 5.8%; box-shadow: 0 8px 30px rgba(0,0,0,.55); }
  #caption { margin-top: 16px; text-align: center; flex-shrink: 0; }
  #caption .cloc { color: #7b5cff; font-size: 11px; font-weight: 700; margin-bottom: 4px; }
  #caption .cno { color: #ffd86b; font-weight: 700; font-size: 15px; }
  #caption .cname { color: #fff; font-size: 18px; font-weight: 700; margin: 0; }
  #cap-link { background: none; border: none; color: #8b94a3; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  #cap-link:hover { color: #ffd86b; }
  #caption .cval { color: #7fd1a0; font-family: Consolas, monospace; font-size: 14px; }
  #caption .cmeta { display: flex; flex-direction: row; flex-wrap: wrap; align-items: baseline; justify-content: center; gap: 2px 12px; min-height: 30px; }
  #caption .cdesc { color: #9aa6b6; font-size: 13px; margin: 4px 0 0; }
  #stage.portrait #caption .cmeta { flex-direction: row; flex-wrap: wrap; align-items: baseline; justify-content: center; gap: 2px 12px; }
  #stage.portrait #caption .cname { margin: 0; }
  #stage.portrait #preview { border-radius: 5.8% / 4%; }
  #caption .cfile { color: #5c6573; font-size: 11px; margin-top: 6px; }
  #report { margin-top: 16px; display: flex; flex-direction: column; align-items: center; gap: 7px; }
  #report .rlabel { font-size: 11px; color: #6f7a8a; letter-spacing: .5px; }
  .rbtns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .rbtns button { border: 1px solid #4a5161; background: #2c313d; color: #cfd5e0; padding: 5px 13px; border-radius: 7px; cursor: pointer; font-size: 12px; }
  .rbtns button:hover { background: #3a4150; color: #fff; border-color: #ffd86b; }
  .rbtns button:disabled { opacity: .35; cursor: default; }
  .rbtns button:disabled:hover { background: #2c313d; color: #cfd5e0; border-color: #4a5161; }
  #rtoast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(8px); background: #2f6db0; color: #fff; padding: 10px 20px; border-radius: 9px; font-size: 13px; box-shadow: 0 6px 22px rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 100; }
  #rtoast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #rmodal { display: none; position: fixed; inset: 0; z-index: 110; align-items: center; justify-content: center; padding: 16px; background: rgba(0,0,0,.55); }
  #rmodal.show { display: flex; }
  .rmbox { width: 100%; max-width: 420px; background: #232732; border: 1px solid #4a5161; border-radius: 12px; padding: 18px; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
  .rmbox h3 { font-size: 15px; color: #ffd86b; margin-bottom: 4px; }
  .rmbox .rmsub { font-size: 12px; color: #9aa6b6; margin-bottom: 12px; }
  .rmbox .rmsub b { color: #7fd1ff; }
  .rmbox .rmlabel { font-size: 12px; color: #cfd5e0; font-weight: 600; margin: 0 2px 6px; }
  .rmbox textarea { width: 100%; min-height: 84px; resize: vertical; padding: 9px 11px; border-radius: 8px; border: 1px solid #3c4150; background: #161922; color: #e8e8ec; font-size: 13px; font-family: inherit; line-height: 1.45; }
  .rmbox .rmhint { font-size: 11px; color: #6f7a8a; margin: 6px 2px 14px; }
  .rmbtns { display: flex; gap: 8px; justify-content: flex-end; }
  .rmbtns button { padding: 8px 18px; border-radius: 7px; cursor: pointer; font-size: 13px; border: 1px solid #4a5161; }
  .rmbtns .rm-cancel { background: #2c313d; color: #cfd5e0; }
  .rmbtns .rm-cancel:hover { background: #3a4150; color: #fff; }
  .rmbtns .rm-ok { background: #ffd86b; color: #1a1d24; border-color: #ffd86b; font-weight: 700; }
  .rmbtns .rm-ok:hover { background: #ffe089; }

  .menu-btn { display: none; position: fixed; top: calc(10px + env(safe-area-inset-top, 0px)); left: 10px; z-index: 60; width: 44px; height: 44px; border-radius: 9px; border: 1px solid #4a5161; background: rgba(44,49,61,.92); color: #ffd86b; font-size: 21px; cursor: pointer; align-items: center; justify-content: center; }
  .backdrop { display: none; }
  @media (max-width: 900px) {
    body { overflow: hidden; }
    .menu-btn { display: flex; }
    #left { position: fixed; top: 0; left: 0; bottom: 0; width: 86%; max-width: 390px; border-right: 1px solid #333842; transform: translateX(-100%); transition: transform .25s ease; z-index: 50; box-shadow: 4px 0 24px rgba(0,0,0,.55); padding-top: calc(58px + env(safe-area-inset-top, 0px)); }
    body.drawer-open #left { transform: translateX(0); }
    #right { width: 100%; }
    #stage { padding: 10px; overflow-y: auto; overflow-x: hidden; justify-content: flex-start; }
    .imgwrap { height: 46vh; }
    #stage.portrait .imgwrap { height: 62vh; }
    .prodtabs, .pentabs, .seriestabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .prodtabs button, .pentabs button, .seriestabs button { flex: 0 0 auto; }
    header { padding-left: 64px; padding-top: calc(11px + env(safe-area-inset-top, 0px)); }
    td.desc2, td.dlg, .col-desc, .col-dlg { display: none; }
    .nav-btn { width: 40px; height: 58px; font-size: 26px; }
    .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; }
    body.drawer-open .backdrop { display: block; }
  }
</style>
</head>
<body>
  <button class="menu-btn" onclick="toggleDrawer()" aria-label="목록 열기/닫기">☰</button>
  <div class="backdrop" onclick="closeDrawer()"></div>
  <div id="left">
    <div id="search">
      <input type="text" id="q" placeholder="🔍 캐릭터 이름·번호 검색 (전체 시리즈)…" oninput="filter()">
      <label class="ext"><input type="checkbox" id="extchk" onchange="filter()"> 대사·설명 포함</label>
      <span id="scount"></span>
    </div>
    <div class="tablewrap">
      <table>
        <thead><tr id="thead-row"><th>카드번호</th><th>캐릭터이름</th><th>설명</th><th>수치</th><th>대사</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div id="right">
    <header>
      <div><h1>SD건담외전 카드다스 아카이브</h1></div>
      <div class="toggle">
        <button id="btn-ko" class="active" onclick="setLang('ko')">한글</button>
        <button id="btn-ja" onclick="setLang('ja')">日本語</button>
      </div>
    </header>
    <div class="prodtabs" id="prodtabs"></div>
    <div class="pentabs" id="pentabs"></div>
    <div class="seriestabs" id="seriestabs"></div>
    <div id="stage">
      <div id="cap-dlg"></div>
      <div class="imgwrap">
        <button class="nav-btn nav-prev" onclick="nav(-1)" aria-label="이전 카드">‹</button>
        <img id="preview" src="" alt="">
        <button class="nav-btn nav-next" onclick="nav(1)" aria-label="다음 카드">›</button>
      </div>
      <div id="caption">
        <div class="cmeta">
          <span class="cno" id="cap-no"></span>
          <span class="cname" id="cap-name"></span>
          <span class="cval" id="cap-val"></span>
          <button id="cap-link" title="이 카드 링크 복사" onclick="copyCardLink()">🔗</button>
        </div>
        <div class="cdesc" id="cap-desc"></div>
        <div id="report">
          <div class="rlabel">오역 신고</div>
          <div class="rbtns">
            <button onclick="openReport('캐릭터 이름')">캐릭터 이름</button>
            <button onclick="openReport('캐릭터 설명')">설명</button>
            <button onclick="openReport('캐릭터 대사')">대사</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="rtoast"></div>
  <div id="rmodal" onclick="if(event.target===this)closeReport()">
    <div class="rmbox">
      <h3>오역 신고</h3>
      <div class="rmsub">범위: <b id="rm-scope"></b></div>
      <div class="rmlabel">제안사항 (선택)</div>
      <textarea id="rm-suggest"></textarea>
      <div class="rmhint">현재 내용이 미리 입력되어 있습니다. 수정하지 않고 제출하면 제안은 비워서 전송됩니다.</div>
      <div class="rmbtns">
        <button class="rm-cancel" onclick="closeReport()">취소</button>
        <button class="rm-ok" onclick="submitReport()">확인</button>
      </div>
    </div>
  </div>

<script src="cards.js"></script>
<script>
let PRODUCTS = [];

let lang = 'ko', curProd = 0, curPen = 0, curSeries = 0, selectedNo = null;
let searchMode = false, curQuery = '', selectedImg = null, curList = [];
const tbody = document.getElementById('tbody');
const prodEl = document.getElementById('prodtabs');
const penEl = document.getElementById('pentabs');
const serEl = document.getElementById('seriestabs');
const scount = document.getElementById('scount');

// flat index of every card across all products/pens/series (initApp에서 채움)
let ALL = [];

function curPens() { return PRODUCTS[curProd].pens; }
function curSer() { return curPens()[curPen].series[curSeries]; }
function imgOf(se, c) { return se.dir + c.img; }
function koVal(v) { return v === 'データ不明' ? '데이터 불명' : v; }
function shownNo(no) { return no.indexOf('特') === 0 ? '특별' + no.slice(1) : no; }

function tab(label, active, on) {
  const b = document.createElement('button');
  b.className = active ? 'active' : ''; b.innerHTML = label; b.onclick = on; return b;
}
function buildProdTabs() {
  prodEl.innerHTML = '';
  PRODUCTS.forEach((p, i) => prodEl.appendChild(tab(lang==='ko'?p.titleKo:p.titleJa, !searchMode && i===curProd, () => goSeries(i,0,0))));
}
function buildPenTabs() {
  penEl.innerHTML = ''; penEl.className = 'pentabs' + (searchMode ? ' tabsdim' : '');
  curPens().forEach((p, i) => penEl.appendChild(tab(lang==='ko'?p.titleKo:p.titleJa, !searchMode && i===curPen, () => goSeries(curProd,i,0))));
}
function buildSeriesTabs() {
  serEl.innerHTML = ''; serEl.className = 'seriestabs' + (searchMode ? ' tabsdim' : '');
  curPens()[curPen].series.forEach((s, i) => serEl.appendChild(tab((lang==='ko'?s.titleKo:s.titleJa)+'<span class="cnt">'+s.cards.length+'</span>', !searchMode && i===curSeries, () => goSeries(curProd,curPen,i))));
}

function setHead(search) {
  document.getElementById('thead-row').innerHTML = search
    ? '<th>카드번호</th><th>캐릭터이름</th><th>시리즈</th><th>수치</th>'
    : '<th>카드번호</th><th>캐릭터이름</th><th class="col-desc">설명</th><th>수치</th><th class="col-dlg">대사</th>';
}
function numCell(c, se) {
  return '<td class="no"><div class="nocell"><img class="thumb" loading="lazy" src=".thumbnail/' + c.img + '" alt=""><span>' + shownNo(c.no) + '</span></div></td>';
}
function newTr(c) {
  const tr = document.createElement('tr');
  tr.dataset.no = c.no; tr.dataset.img = c.img;
  if (c.img === selectedImg) tr.className = 'selected';
  return tr;
}

function buildRows() {
  setHead(false);
  tbody.innerHTML = '';
  const se = curSer();
  const lk = PRODUCTS[curProd].titleKo+' · '+curPens()[curPen].titleKo+' · '+se.titleKo;
  const lj = PRODUCTS[curProd].titleJa+' · '+curPens()[curPen].titleJa+' · '+se.titleJa;
  curList = se.cards.map(function(c){ return { c: c, se: se, lk: lk, lj: lj }; });
  se.cards.forEach(c => {
    const tr = newTr(c);
    tr.innerHTML = numCell(c, se) +
      '<td class="name">' + (lang==='ko'?c.kn:c.jn) + '</td>' +
      '<td class="desc2">' + (lang==='ko'?(c.kdesc||''):(c.jdesc||'')) + '</td>' +
      '<td class="val">' + (lang==='ko'?koVal(c.v):c.v) + '</td>' +
      '<td class="dlg">' + (lang==='ko'?c.kd:c.jd) + '</td>';
    tr.onclick = () => { select(c.no); closeDrawerOnMobile(); };
    tbody.appendChild(tr);
  });
}

function buildSearchRows(q) {
  setHead(true);
  tbody.innerHTML = '';
  curList = [];
  const ext = document.getElementById('extchk').checked;
  let n = 0; const LIMIT = 800;
  const frag = document.createDocumentFragment();
  for (const e of ALL) {
    const c = e.c;
    const hay = ext
      ? (c.no+' '+c.jn+' '+c.kn+' '+(c.jdesc||'')+' '+(c.kdesc||'')+' '+c.jd+' '+c.kd).toLowerCase()
      : (c.no+' '+c.jn+' '+c.kn).toLowerCase();
    if (!hay.includes(q)) continue;
    n++;
    if (n <= LIMIT) {
      curList.push({ c: e.c, se: e.se, lk: e.plKo, lj: e.plJa });
      const tr = newTr(c);
      tr.innerHTML = numCell(c, e.se) +
        '<td class="name">' + (lang==='ko'?c.kn:c.jn) + '</td>' +
        '<td class="loc2">' + (lang==='ko'?e.plKo:e.plJa) + '</td>' +
        '<td class="val">' + (lang==='ko'?koVal(c.v):c.v) + '</td>';
      tr.onclick = () => { showCard(e.se, e.c, e.plKo, e.plJa); closeDrawerOnMobile(); };
      frag.appendChild(tr);
    }
  }
  tbody.appendChild(frag);
  scount.innerHTML = '검색 결과 <b>' + n + '</b>건' + (n > LIMIT ? ' (상위 ' + LIMIT + '건 표시)' : '');
}

function setOrient() {
  const img = document.getElementById('preview');
  if (img.naturalWidth) document.getElementById('stage').classList.toggle('portrait', img.naturalHeight > img.naturalWidth);
}
function fitDialogue() {
  const el = document.getElementById('cap-dlg');
  if (!el) return;
  if (!el.textContent) { el.style.fontSize = ''; return; }
  let size = 16; el.style.fontSize = size + 'px';
  let guard = 0;
  while (el.scrollWidth > el.clientWidth + 1 && size > 8 && guard < 40) { size -= 0.5; el.style.fontSize = size + 'px'; guard++; }
}
function cardIdOf(c) { return c.img.replace(/\.(jpg|png)$/i, ''); }
function showCard(se, c, locKo, locJa) {
  selectedImg = c.img; selectedNo = c.no;
  try { history.replaceState(null, '', '#' + cardIdOf(c)); } catch (e) {}
  document.querySelectorAll('#tbody tr').forEach(tr => tr.classList.toggle('selected', tr.dataset.img === c.img));
  document.getElementById('cap-dlg').textContent = (lang==='ko' ? c.kd : c.jd) || '';
  const img = document.getElementById('preview');
  img.onload = setOrient;
  img.src = imgOf(se, c);
  setOrient();
  document.getElementById('cap-no').textContent = shownNo(c.no);
  document.getElementById('cap-name').textContent = (lang==='ko'?c.kn:c.jn);
  document.getElementById('cap-desc').textContent = (lang==='ko'?(c.kdesc||''):(c.jdesc||''));
  document.getElementById('cap-val').textContent = (lang==='ko'?koVal(c.v):c.v);
  updateNavButtons();
  fitDialogue();
}
window.addEventListener('resize', function(){ if (selectedImg) fitDialogue(); });
function updateNavButtons() {
  const prevB = document.querySelector('.nav-prev'), nextB = document.querySelector('.nav-next');
  if (!prevB || !nextB) return;
  let idx = curList.findIndex(function(e){ return e.c.img === selectedImg; });
  if (idx < 0) idx = 0;
  let atFirst, atLast;
  if (searchMode) {
    atFirst = idx <= 0; atLast = idx >= curList.length - 1;
  } else {
    const flat = seriesFlat();
    const pos = flat.findIndex(function(s){ return s.pi===curProd && s.ei===curPen && s.si===curSeries; });
    atFirst = (pos <= 0) && (idx <= 0);
    atLast = (pos >= flat.length - 1) && (idx >= curList.length - 1);
  }
  prevB.disabled = atFirst; nextB.disabled = atLast;
}
function select(no) {
  selectedNo = no;
  const se = curSer();
  const c = se.cards.find(x => x.no === no) || se.cards[0];
  const locKo = PRODUCTS[curProd].titleKo+' · '+curPens()[curPen].titleKo+' · '+se.titleKo;
  const locJa = PRODUCTS[curProd].titleJa+' · '+curPens()[curPen].titleJa+' · '+se.titleJa;
  showCard(se, c, locKo, locJa);
}

// switch series via tabs
function goSeries(pi, ei, si) {
  searchMode = false; curQuery = ''; document.getElementById('q').value = ''; scount.textContent = '';
  curProd = pi; curPen = ei; curSeries = si; selectedNo = curSer().cards[0].no;
  render();
}

function render() {
  buildProdTabs(); buildPenTabs(); buildSeriesTabs();
  if (searchMode) { buildSearchRows(curQuery); }
  else {
    if (!curSer().cards.find(x => x.no === selectedNo)) selectedNo = curSer().cards[0].no;
    buildRows(); select(selectedNo);
  }
}
function setLang(l) {
  lang = l;
  document.getElementById('btn-ko').classList.toggle('active', l==='ko');
  document.getElementById('btn-ja').classList.toggle('active', l==='ja');
  render();
}
function filter() {
  const v = document.getElementById('q').value.toLowerCase().trim();
  if (v) { searchMode = true; curQuery = v; buildProdTabs(); buildPenTabs(); buildSeriesTabs(); buildSearchRows(v); }
  else { searchMode = false; curQuery = ''; scount.textContent = ''; render(); }
}
function toggleDrawer() { document.body.classList.toggle('drawer-open'); }
function closeDrawer() { document.body.classList.remove('drawer-open'); }
function closeDrawerOnMobile() { if (window.matchMedia('(max-width: 900px)').matches) document.body.classList.remove('drawer-open'); }
function goToHash() {
  const id = decodeURIComponent((location.hash || '').replace(/^#/, '')).trim();
  if (!id) return false;
  const e = ALL.find(function(x){ return cardIdOf(x.c) === id; });
  if (!e) return false;
  searchMode = false; curQuery = '';
  const q = document.getElementById('q'); if (q) q.value = '';
  if (scount) scount.textContent = '';
  curProd = e.pi; curPen = e.ei; curSeries = e.si; selectedNo = e.c.no; selectedImg = e.c.img;
  render();
  const row = document.querySelector('#tbody tr.selected');
  if (row && row.scrollIntoView) row.scrollIntoView({ block: 'nearest' });
  return true;
}
function copyCardLink() {
  const url = location.href;
  const done = function(){ const b = document.getElementById('cap-link'); if (!b) return; b.textContent = '✓'; setTimeout(function(){ b.textContent = '🔗'; }, 1200); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done, done);
  else { try { const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); } catch (e) {} }
}
// 오역 신고 — 구글 폼으로 직접 제출 (숨김 iframe POST)
var FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLScYZF_S0si-2OLJBKacN_ASJDdCtQjqhp6LUPTSdsTdux72gQ/formResponse';
var FORM_ANCHOR = 'entry.100283352';
var FORM_SCOPE = 'entry.617394472';
var FORM_SUGGEST = 'entry.1950726599';
var reportScope = null, reportOriginal = '';
function showToast(msg) {
  var t = document.getElementById('rtoast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t); showToast._t = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}
function openReport(scope) {
  if (!selectedImg) { showToast('먼저 카드를 선택해 주세요.'); return; }
  reportScope = scope;
  document.getElementById('rm-scope').textContent = scope;
  var srcId = scope === '캐릭터 이름' ? 'cap-name' : (scope === '캐릭터 설명' ? 'cap-desc' : 'cap-dlg');
  var src = document.getElementById(srcId);
  reportOriginal = (src && src.textContent) ? src.textContent : '';
  var ta = document.getElementById('rm-suggest'); ta.value = reportOriginal;
  document.getElementById('rmodal').classList.add('show');
  ta.focus();
}
function closeReport() {
  document.getElementById('rmodal').classList.remove('show');
  reportScope = null;
}
function submitReport() {
  if (!reportScope || !selectedImg) { closeReport(); return; }
  var val = document.getElementById('rm-suggest').value;
  // 페이지 텍스트 그대로(수정 안 함)면 제안을 비워서 제출
  var suggest = (val.trim() === reportOriginal.trim()) ? '' : val.trim();
  var ifr = document.getElementById('rsink');
  if (!ifr) { ifr = document.createElement('iframe'); ifr.id = 'rsink'; ifr.name = 'rsink'; ifr.style.display = 'none'; document.body.appendChild(ifr); }
  var f = document.createElement('form');
  f.action = FORM_ACTION; f.method = 'POST'; f.target = 'rsink'; f.style.display = 'none';
  function add(n, v) { var i = document.createElement('input'); i.type = 'hidden'; i.name = n; i.value = v; f.appendChild(i); }
  add(FORM_ANCHOR, location.href);
  add(FORM_SCOPE, reportScope);
  if (suggest) add(FORM_SUGGEST, suggest);
  document.body.appendChild(f);
  f.submit();
  setTimeout(function(){ if (f.parentNode) f.parentNode.removeChild(f); }, 1500);
  closeReport();
  showToast('오역 신고가 접수되었습니다. 감사합니다!');
}
let SERIES_FLAT = null;
function seriesFlat() {
  if (SERIES_FLAT) return SERIES_FLAT;
  SERIES_FLAT = [];
  PRODUCTS.forEach(function(p, pi){ p.pens.forEach(function(pe, ei){ pe.series.forEach(function(se, si){ SERIES_FLAT.push({ pi: pi, ei: ei, si: si }); }); }); });
  return SERIES_FLAT;
}
function nav(dir) {
  if (!curList.length) return;
  let idx = curList.findIndex(function(e){ return e.c.img === selectedImg; });
  if (idx < 0) idx = 0;
  const ni = idx + dir;
  if (ni >= 0 && ni < curList.length) {
    const e = curList[ni];
    showCard(e.se, e.c, e.lk, e.lj);
    const row = document.querySelector('#tbody tr[data-img="' + e.c.img + '"]');
    if (row && row.scrollIntoView) row.scrollIntoView({ block: 'nearest' });
    return;
  }
  // 검색 중에는 결과 안에서만 이동
  if (searchMode) return;
  // 시리즈 경계 → 인접 시리즈로 이동 (끝에서는 순환)
  const flat = seriesFlat();
  const pos = flat.findIndex(function(s){ return s.pi===curProd && s.ei===curPen && s.si===curSeries; });
  if (pos < 0) return;
  const np = pos + dir;
  if (np < 0 || np >= flat.length) return;
  const s = flat[np];
  curProd = s.pi; curPen = s.ei; curSeries = s.si;
  const cards = curSer().cards;
  const tgt = (dir > 0) ? cards[0] : cards[cards.length - 1];
  selectedNo = tgt.no; selectedImg = tgt.img;
  render();
  const row = document.querySelector('#tbody tr.selected');
  if (row && row.scrollIntoView) row.scrollIntoView({ block: 'nearest' });
}
document.addEventListener('keydown', function(ev){
  var rm = document.getElementById('rmodal');
  if (rm && rm.classList.contains('show')) { if (ev.key === 'Escape') closeReport(); return; }
  if (ev.target && (ev.target.id === 'q' || ev.target.id === 'rm-suggest')) return;
  if (ev.key === 'ArrowLeft') nav(-1);
  else if (ev.key === 'ArrowRight') nav(1);
});
(function(){
  const area = document.getElementById('stage');
  let sx = 0, sy = 0, st = 0, tracking = false;
  area.addEventListener('touchstart', function(e){
    if (e.touches.length !== 1) { tracking = false; return; }
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now(); tracking = true;
  }, { passive: true });
  area.addEventListener('touchend', function(e){
    if (!tracking) return; tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy) * 1.4 && (Date.now() - st) < 700) {
      nav(dx < 0 ? 1 : -1);
    }
  }, { passive: true });
})();

function initApp() {
  // 같은 시리즈 안에서 카드번호가 중복되면 -a, -b, -c ... 접미사를 붙여 구분
  PRODUCTS.forEach(function(p){ p.pens.forEach(function(pe){ pe.series.forEach(function(se){
    const cnt = {};
    se.cards.forEach(function(c){ cnt[c.no] = (cnt[c.no] || 0) + 1; });
    const seen = {};
    se.cards.forEach(function(c){
      if (cnt[c.no] > 1) { const base = c.no; seen[base] = (seen[base] || 0) + 1; c.no = base + '-' + String.fromCharCode(96 + seen[base]); }
    });
  }); }); });
  // 전체 카드 평면 인덱스
  ALL = [];
  PRODUCTS.forEach(function(p, pi){ p.pens.forEach(function(pe, ei){ pe.series.forEach(function(se, si){ se.cards.forEach(function(c){
    ALL.push({ c: c, pi: pi, ei: ei, si: si, se: se, plKo: p.titleKo + ' · ' + pe.titleKo + ' · ' + se.titleKo, plJa: p.titleJa + ' · ' + pe.titleJa + ' · ' + se.titleJa });
  }); }); }); });
  selectedNo = curSer().cards[0].no;
  if (!goToHash()) render();
  window.addEventListener('hashchange', goToHash);
}
if (typeof CARDS !== 'undefined' && CARDS && CARDS.length) { PRODUCTS = CARDS; initApp(); }
else { document.getElementById('tbody').innerHTML = '<tr><td style="padding:20px;color:#e88">카드 데이터(cards.js)를 불러오지 못했습니다.</td></tr>'; }
</script>
